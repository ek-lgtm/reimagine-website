<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get in touch | Reimagine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F8F9;
    --bg-2:#EDEFF0;
    --ink:#141516;
    --ink-dim:#6B6E70;
    --red:#FF514D;
    --line:#D6D9DB;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Archivo',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:0 40px;
    width:100%;
  }
  .top{
    padding:32px 0;
  }
  .back-link{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-dim);
    text-decoration:none;
  }
  .back-link:hover{color:var(--red);}
  main{
    flex:1;
    display:flex;
    align-items:center;
  }
  .content{
    max-width:560px;
  }
  h1{
    font-weight:800;
    font-size:clamp(36px, 5vw, 56px);
    letter-spacing:-0.02em;
    margin-bottom:28px;
  }
  p{
    color:var(--ink-dim);
    font-size:17px;
    line-height:1.6;
    max-width:440px;
    margin-bottom:32px;
  }
  .email-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-weight:600;
    font-size:20px;
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--ink);
    padding-bottom:6px;
    transition:color 0.2s, border-color 0.2s;
  }
  .email-link:hover{
    color:var(--red);
    border-color:var(--red);
  }
</style>
</head>
<body>

<div class="top wrap">
  <a href="index.html" class="back-link" onclick="if(document.referrer){history.back();return false;}">&larr; Back to site</a>
</div>

<main>
  <div class="wrap">
    <div class="content">
      <h1>Get in touch</h1>
      <p>Tell us about the site, the scheme, or the street. We reply within a couple of days.</p>
      <a class="email-link" href="mailto:hello@reimagine.city">hello@reimagine.city &rarr;</a>
    </div>
  </div>
</main>

</body>
</html>
